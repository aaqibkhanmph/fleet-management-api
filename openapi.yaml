openapi: 3.1.0
info:
  title: Fleet Management API
  description: Service for managing EV fleets and charging sessions.
  version: 1.0.0
  license:
    name: MIT
servers:
  - url: http://localhost:8080
    description: Local development server
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: x-api-key
  schemas:
    Error:
      type: object
      required: [title, status, detail, traceId]
      properties:
        type:
          type: string
          example: about:blank
        title:
          type: string
          example: Bad Request
        status:
          type: integer
          example: 400
        detail:
          type: string
          example: Validation failed
        instance:
          type: string
          example: /api/v1/vehicles
        traceId:
          type: string
          format: uuid
        errors:
          type: array
          items:
            type: object
            properties:
              field:
                type: string
              message:
                type: string
    Vehicle:
      type: object
      properties:
        id:
          type: string
          format: uuid
        vin:
          type: string
          minLength: 17
          maxLength: 17
        make:
          type: string
        model:
          type: string
        year:
          type: integer
        color:
          type: string
        status:
          type: string
          enum: [active, maintenance, retired]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    Session:
      type: object
      properties:
        id:
          type: string
          format: uuid
        vehicleId:
          type: string
          format: uuid
        stationId:
          type: string
        maxKwh:
          type: number
        consumedKwh:
          type: number
        status:
          type: string
          enum: [active, completed]
        startedAt:
          type: string
          format: date-time
        endedAt:
          type: string
          format: date-time
paths:
  /api/v1/vehicles:
    get:
      tags: [API A - Vehicles]
      summary: List vehicles
      security: [{ ApiKeyAuth: [] }]
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: pageSize
          in: query
          schema: { type: integer, default: 50, maximum: 500 }
      responses:
        200:
          description: List of vehicles
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: '#/components/schemas/Vehicle' }
                  total: { type: integer }
                  page: { type: integer }
                  pageSize: { type: integer }
    post:
      tags: [API A - Vehicles]
      summary: Create vehicle
      security: [{ ApiKeyAuth: [] }]
      parameters:
        - name: Idempotency-Key
          in: header
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [vin, make, model, year]
              properties:
                vin: { type: string, minLength: 17, maxLength: 17 }
                make: { type: string }
                model: { type: string }
                year: { type: integer }
      responses:
        201:
          description: Created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Vehicle' }
  /api/v1/sessions:
    post:
      tags: [API B - Sessions]
      summary: Start charging session
      security: [{ ApiKeyAuth: [] }]
      parameters:
        - name: Idempotency-Key
          in: header
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [vehicleId, stationId, maxKwh]
              properties:
                vehicleId: { type: string, format: uuid }
                stationId: { type: string }
                maxKwh: { type: number, minimum: 0 }
      responses:
        201:
          description: Session started
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Session' }
